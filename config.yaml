security:
  max_file_writes: 10
  max_file_size_mb: 1
  max_plan_steps: 20
  allowed_roots:
  - .
  - ./output
  - ./workspace
  - ./temp
  blocked_paths:
  - C:\Windows
  - C:\Program Files
  - C:\System32
  - /etc
  - /usr
  - /bin
  - /sbin
  - /root
  - ~/.ssh
  - ~/.aws
  - ~/.config
  blocked_extensions:
  - .exe
  - .bat
  - .cmd
  - .ps1
  - .sh
  - .dll
llm:
  analysis_model: qwen
  code_model: qwen
  review_model: qwen
  fallback_model: qwen
  default_model: qwen
  temperature: 0.7
  max_tokens: 4096
  max_retries: 3
  timeout_seconds: 300
  ollama_url: http://localhost:11434
  provider: ollama
  api_key: ''
  base_url: ''
  models:
    qwen:
      name: qwen2.5-coder:14b
      context_length: 16384
      description: Qwen 2.5 Coder 14B - Optimized for code generation (Q4_K_M)
      strengths:
      - code_generation
      - syntax
      - refactoring
    mistral:
      name: mistral:7b
      context_length: 8192
      description: Mistral 7B - Fast reasoning and analysis
      strengths:
      - reasoning
      - analysis
      - planning
      - review
    phi:
      name: phi3:latest
      context_length: 2048
      description: Phi 3 - Lightweight for simple tasks
      strengths:
      - simple_tasks
      - fast_response
    gpt-4o:
      name: gpt-4o
      context_length: 128000
      description: OpenAI GPT-4o
      strengths:
      - reasoning
      - code_generation
      - planning
    gpt-4-turbo:
      name: gpt-4-turbo
      context_length: 128000
      description: OpenAI GPT-4 Turbo
      strengths:
      - reasoning
      - code_generation
      - planning
    gpt-3.5-turbo:
      name: gpt-3.5-turbo
      context_length: 16385
      description: OpenAI GPT-3.5 Turbo - fast and cheap
      strengths:
      - simple_tasks
      - fast_response
    gemini-1.5-pro:
      name: gemini-1.5-pro
      context_length: 1000000
      description: Google Gemini 1.5 Pro
      strengths:
      - reasoning
      - code_generation
      - long_context
    gemini-1.5-flash:
      name: gemini-1.5-flash
      context_length: 1000000
      description: Google Gemini 1.5 Flash - fast and cheap
      strengths:
      - simple_tasks
      - fast_response
    gemini-2.5-flash:
      name: gemini-2.5-flash
      context_length: 1000000
      description: Google Gemini 2.5 Flash
      strengths:
      - reasoning
      - code_generation
      - planning
    chatgpt:
      name: gpt-4o
      context_length: 128000
      description: ChatGPT GPT-4o
      strengths:
      - reasoning
      - code_generation
timeouts:
  sandbox_test: 30
  llm_request: 300
  health_check: 5
  startup_wait: 2
api:
  host: 0.0.0.0
  port: 8000
  url: http://localhost:8000
improvement:
  max_iterations: 1
  auto_approve_low_risk: true
  sandbox_timeout: 120
  approval_timeout: 300
  max_retries: 3
  warmup_enabled: false
  max_error_history: 10
  rate_limit_delay: 0.5
  max_logs_display: 50
  code_preview_chars: 3000
  protected_files:
  - core/immutable_brain_stem.py
  - core/config_manager.py
  - core/proposal_generator.py
  - core/orchestrated_code_generator.py
  - core/patch_generator.py
  - core/change_classifier.py
  - core/change_locator.py
  - core/diff_generator.py
  - api/server.py
  - tools/test_tool.py
session:
  conversation_history_limit: 20
db_plan_history: data/plan_history.db
db_analytics: data/analytics.db
db_conversations: data/conversations.db
mcp_servers:
- name: puppeteer
  transport: stdio
  command: mcp-server-puppeteer
  enabled: true
- name: filesystem
  transport: stdio
  command: npx -y @modelcontextprotocol/server-filesystem
  enabled: true
- name: git
  transport: stdio
  command: npx -y @modelcontextprotocol/server-git
  enabled: false
- name: sqlite
  transport: stdio
  command: npx -y @modelcontextprotocol/server-sqlite
  enabled: false
- name: fetch
  transport: stdio
  command: npx -y @modelcontextprotocol/server-fetch
  enabled: false
- name: memory
  transport: stdio
  command: npx -y @modelcontextprotocol/server-memory
  enabled: true
- name: brave-search
  transport: stdio
  command: npx -y @modelcontextprotocol/server-brave-search
  env_key: BRAVE_API_KEY
  enabled: false
- name: github
  transport: stdio
  command: npx -y @modelcontextprotocol/server-github
  env_key: GITHUB_PERSONAL_ACCESS_TOKEN
  enabled: true
- name: slack
  transport: stdio
  command: npx -y @modelcontextprotocol/server-slack
  env_key: SLACK_BOT_TOKEN
  enabled: false
- name: gdrive
  transport: stdio
  command: npx -y @modelcontextprotocol/server-gdrive
  env_key: GDRIVE_CLIENT_ID
  enabled: true
